<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <link rel="stylesheet" href="./assets/styles.css" />
    <title>Estadisticas</title>
  </head>
  <body>
    <header>
      <h1>Estadisticas educativas</h1>
    </header>
    <!-- Grilla de graficos -->
    <div class="dashboard">
      <div class="chart-card">
        <h2>Estudiantes</h2>
        <canvas id="estudiantes"></canvas>
      </div>

      <div class="chart-card">
        <h2>Asistencias General</h2>
        <canvas id="asistenciasGeneral"></canvas>
        <!-- Area de dibujo en blanco -->
      </div>

      <div class="chart-card">
        <h2>Asistencias</h2>
        <canvas id="asistencias"></canvas>
      </div>

      <div class="chart-card">
        <h2>Asistencias por Mes</h2>
        <canvas id="asistenciasPorMes"></canvas>
      </div>

      <div class="chart-card">
        <h2>Calificaciones</h2>
        <canvas id="calificaciones"></canvas>
      </div>

      <div class="chart-card">
        <h2>Calificaciones por Nivel</h2>
        <canvas id="calificacionPorNivel"></canvas>
      </div>

      <div class="chart-card">
        <h2>Envio de Comunicados</h2>
        <canvas id="envioDeComunicados"></canvas>
      </div>
    </div>
    <footer>
      <p>
        © 2026 All rights reserved | Matias Rosa, Camila
        Larsen & Matias Nerli.
      </p>
    </footer>
    <script src="main.js"></script>
  </body>
</html>
